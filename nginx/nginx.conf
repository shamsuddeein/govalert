server {
    listen 80;
    server_name govalert.ng www.govalert.ng;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl http2;
    server_name govalert.ng;
    ssl_certificate /etc/letsencrypt/live/govalert.ng/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/govalert.ng/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    # Telegram webhook — allow only Telegram IPs
    location /telegram/webhook/ {
        allow 149.154.160.0/20;
        allow 91.108.4.0/22;
        deny all;
        proxy_pass http://django:8000;
        proxy_set_header Host $host;
    }
    location /api/ {
        proxy_pass http://django:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 10M;
    }
    location /static/ {
        alias /app/static/;
        expires 30d;
    }
}
