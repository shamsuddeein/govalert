services:
  db:
    image: postgres:15-alpine
    volumes: [postgres_data:/var/lib/postgresql/data]
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME:-govalert}
      POSTGRES_USER: ${DB_USER:-govalert}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: always
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes: [redis_data:/data]
    restart: always
  migrate:
    build: .
    command: sh -c "python manage.py migrate --noinput && python manage.py load_ng_portals && python manage.py collectstatic --noinput"
    volumes: [static_volume:/app/staticfiles]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-govalert}:${DB_PASSWORD:-change-me}@db:5432/${DB_NAME:-govalert}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
  django:
    build: .
    command: gunicorn config.wsgi:application -w 4 -b 0.0.0.0:8000
    volumes: [static_volume:/app/staticfiles, media_volume:/app/media]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-govalert}:${DB_PASSWORD:-change-me}@db:5432/${DB_NAME:-govalert}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: always
  celery-monitor:
    build: .
    command: celery -A config worker -Q monitoring -c 4 -n monitor@%h --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-govalert}:${DB_PASSWORD:-change-me}@db:5432/${DB_NAME:-govalert}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: always
  celery-notify:
    build: .
    command: celery -A config worker -Q notifications -c 8 -n notify@%h --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-govalert}:${DB_PASSWORD:-change-me}@db:5432/${DB_NAME:-govalert}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: always
  celery-ai:
    build: .
    command: celery -A config worker -Q ai -c 2 -n ai@%h --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-govalert}:${DB_PASSWORD:-change-me}@db:5432/${DB_NAME:-govalert}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: always
  celery-beat:
    build: .
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-govalert}:${DB_PASSWORD:-change-me}@db:5432/${DB_NAME:-govalert}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: always
  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - certbot_etc:/etc/letsencrypt
    ports: ['80:80', '443:443']
    depends_on: [django]
    restart: always
volumes:
  postgres_data: {}
  redis_data: {}
  static_volume: {}
  media_volume: {}
  certbot_etc: {}
