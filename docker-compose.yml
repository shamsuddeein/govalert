version: '3.9'
services:
  db:
    image: postgres:15-alpine
    volumes: [postgres_data:/var/lib/postgresql/data]
    env_file: .env
    restart: always
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes: [redis_data:/data]
    restart: always
  django:
    build: .
    command: gunicorn config.wsgi:application -w 4 -b 0.0.0.0:8000
    volumes: [static_volume:/app/static, media_volume:/app/media]
    env_file: .env
    depends_on: [db, redis]
    restart: always
  celery-monitor:
    build: .
    command: celery -A config worker -Q monitoring -c 4 -n monitor@%h --loglevel=info
    env_file: .env
    depends_on: [db, redis]
    restart: always
  celery-notify:
    build: .
    command: celery -A config worker -Q notifications -c 8 -n notify@%h --loglevel=info
    env_file: .env
    depends_on: [db, redis]
    restart: always
  celery-ai:
    build: .
    command: celery -A config worker -Q ai -c 2 -n ai@%h --loglevel=info
    env_file: .env
    depends_on: [db, redis]
    restart: always
  celery-beat:
    build: .
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    depends_on: [db, redis]
    restart: always
  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/static
      - certbot_etc:/etc/letsencrypt
    ports: ['80:80', '443:443']
    depends_on: [django]
    restart: always
volumes:
  postgres_data: {}
  redis_data: {}
  static_volume: {}
  media_volume: {}
  certbot_etc: {}
